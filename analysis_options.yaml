# Configuração do analyzer (estática de Dart/Flutter) — perfil RIGOROSO.
# Base: very_good_analysis (preset do VGV) + strict de tipos. Gate de CI.
# Rode `flutter analyze` antes de considerar trabalho concluído.

include: package:very_good_analysis/analysis_options.yaml

analyzer:
  # Rigor de tipos: força casts explícitos, inferência e tipos crus (raw).
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  exclude:
    - 'build/**'
    - '.dart_tool/**'
    - 'lib/**.g.dart' # código gerado pelo build_runner (riverpod_generator)

  errors:
    todo: ignore # TODOs aceitos como info
    # Afrouxamento pragmático de regras opinativas/barulhentas do VGA:
    public_member_api_docs: ignore # doc completa em todo membro público é escopo separado
    lines_longer_than_80_chars: ignore # 80 chars é apertado p/ paths/URLs de IDE desktop
    cascade_invocations: ignore # estilo
    flutter_style_todos: ignore # formato de TODO opinativo
    sort_pub_dependencies: ignore # estilo; mistura sdk/flutter atrapalha a ordem
    use_setters_to_change_properties: ignore # notifiers Riverpod usam métodos de ação; setter é opinativo
    prefer_int_literals: ignore # estilo; editor tem muitas medidas double explícitas
    use_late_for_private_fields_and_variables: ignore # estilo; campos inicializados inline são válidos sem late

# very_good_analysis é um preset fechado: NÃO listar regras em linter.rules
# (sobrescrever anula o preset). Para afrouxar regras barulhentas, use
# analyzer.errors (ex.: public_member_api_docs: ignore) com critério.
