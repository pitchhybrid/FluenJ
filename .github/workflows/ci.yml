name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # --fatal-infos: falha o CI em QUALQUER issue (erro, warning ou info),
      # inclusive os lints rigorosos do analysis_options.yaml.
      - name: Analyze (strict)
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test
